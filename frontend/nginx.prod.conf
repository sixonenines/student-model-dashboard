server {
    listen 80;
    server_name localhost;

    client_max_body_size 50M;

    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /studentmodelsdashboard/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /studentmodelsdashboard/index.html;
    }

    location /studentmodelsdashboardbackendpython/api/ {
        proxy_pass http://python-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    location /studentmodelsdashboardbackendrscript/api/ {
        proxy_pass http://r-backend:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }
}
